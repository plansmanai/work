<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Work — Plansman Inc</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script>
/* Embed-aware: inside the Weebly iframe (plansman.com/work) the site chrome
   would DOUBLE the site's own nav in a cramped box — hide it and go fluid.
   Standalone (work.plansman.com later) keeps the full chrome. Runs before
   first paint so there's no flash. */
if (window.self !== window.top) { document.documentElement.className += ' embedded'; }
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Site chrome (replicates plansman.com theme) ────────── */
html, body { height: 100%; }
/* Stop iOS Safari's automatic font inflation — it was doubling the to-do
   strip on phones while leaving table cells alone, making all our font
   sizing appear broken on mobile. Our pixel sizes are the law. */
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: 'Lato', "Helvetica Neue", Arial, sans-serif; color: #626262;
  background: #222121; display: flex; flex-direction: column; }
.pm-container { width: min(1240px, 94vw); margin: 0 auto; }

#pm-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 14;
  border-top: 3px solid #199ad0; background: rgba(0,0,0,0.85); }
#pm-nav .pm-container { display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; }
#pm-logo { display: flex; align-items: center; padding: 5px 0; }
#pm-logo img { max-height: 42px; display: block; }
#pm-nav ul { list-style: none; display: flex; flex-wrap: wrap; }
#pm-nav ul li { text-transform: uppercase; margin-right: 5px; }
#pm-nav ul li:last-child { margin-right: 0; }
#pm-nav ul li a { display: block; font-family: 'Lato', sans-serif; color: #fff;
  padding: 14px 12px; font-size: 13px; font-weight: bold; text-decoration: none; }
#pm-nav ul li.pm-active a, #pm-nav ul li a:hover { color: #333; background: #199ad0; }

#pm-main { flex: 1; width: 100%; background: #fff url('body-bg.png') 0 0 repeat;
  padding: 76px 0 40px; }
.pm-page-title { font-family: 'Bebas Neue', 'Bebas', sans-serif; font-weight: normal;
  color: #3b3b3b; text-transform: uppercase; font-size: 32px; line-height: 37px;
  text-align: center; padding: 18px 0 0; letter-spacing: .5px; }

#pm-footer { width: 100%; background: #222121; padding: 35px 0 20px; }
#pm-footer .pm-container { text-align: center; font-family: 'Bebas Neue', 'Bebas', sans-serif;
  font-size: 22px; color: #d5d5d5; text-transform: lowercase; letter-spacing: .5px; }
#pm-footer a { color: #d5d5d5; text-decoration: none; }
#pm-footer a:hover { color: #199ad0; }
#pm-footer .pm-dot { padding: 0 18px; color: #6a6a6a; }

@media (max-width: 700px) {
  #pm-nav .pm-container { justify-content: center; }
  #pm-nav ul li a { padding: 10px 8px; font-size: 12px; }
  #pm-main { padding-top: 108px; }
  #pm-footer .pm-container { font-size: 16px; }
  #pm-footer .pm-dot { padding: 0 8px; }
}

/* ── Embedded mode (inside the Weebly iframe at plansman.com/work) ──
   The host page already has the site's nav and footer — showing ours
   twice in a ~900px box is noise. Chrome off, fluid width, transparent
   background so the Weebly page shows through. */
html.embedded #pm-nav, html.embedded #pm-footer { display: none; }
html.embedded body { background: transparent; }
html.embedded #pm-main { padding: 6px 0 20px; background: #fff; }
html.embedded .pm-container, html.embedded .ew-wrap { width: 100%; padding-left: 8px; padding-right: 8px; }
html.embedded table.ew-tbl { min-width: 760px; }

/* ── Portal app ─────────────────────────────────────────── */
.ew-wrap { width: min(1240px, 94vw); margin: 0 auto; padding: 12px 0 24px; color: #2c3e50; }
.ew-sub { text-align: center; color: #888; font-size: 16px; margin-bottom: 24px; }

/* Login */
.ew-login { max-width: 380px; margin: 8px auto 0; }
.ew-login label { display: block; font-size: 13px; font-weight: 700; color: #777;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.ew-login input { width: 100%; padding: 14px 16px; font-size: 18px; border: 2px solid #ddd;
  border-radius: 8px; outline: none; font-family: inherit; margin-bottom: 16px; background: #fff; }
.ew-login input:focus { border-color: #199ad0; }
.ew-login button { width: 100%; padding: 14px; font-size: 17px; font-weight: 600; background: #199ad0;
  color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
.ew-login button:hover { background: #1688b7; }
.ew-login button:disabled { background: #999; cursor: not-allowed; }
.ew-back { display: inline-block; margin-top: 14px; color: #199ad0; font-size: 14px;
  cursor: pointer; text-decoration: none; }
.ew-greet { text-align: center; font-size: 18px; color: #1a1a2e; margin-bottom: 18px; font-weight: 600; }
.ew-err { text-align: center; color: #c0392b; padding: 12px; font-size: 15px; }

/* Results header */
.ew-hdr { display: flex; justify-content: space-between; align-items: baseline;
  flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.ew-hdr h2 { font-size: 24px; color: #1a1a2e; font-family: inherit; }
.ew-logout { color: #199ad0; font-size: 14px; cursor: pointer; }
.ew-section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase;
  letter-spacing: .5px; margin: 26px 0 12px; }

/* WORKFLOW-style table: one project per row group (data row + timeline row) */
.ew-job { font-size: 15px; font-weight: 800; color: #1a1a2e; white-space: nowrap; }
.ew-type { font-size: 11.5px; color: #8a9099; font-weight: 400; }
.ew-badge { display: inline-block; padding: 3px 11px; border-radius: 16px; font-size: 12.5px;
  font-weight: 600; letter-spacing: .2px; border: 1.5px solid currentColor; white-space: nowrap; }
.ew-addr { color: #6b7280; font-size: 12px; }
.ew-pay { font-size: 12.5px; }
.ew-muted { color: #aab; }

.ew-due { display: inline-block; padding: 5px 13px; border-radius: 8px; font-size: 15px;
  font-weight: 800; white-space: nowrap; }
.ew-due-red { background: #fdecea; color: #a32d2d; }
.ew-due-amber { background: #fff3e0; color: #b86e00; }
.ew-due-green { background: #e8f8e8; color: #27763a; }
.ew-due-none { background: #f0f1f3; color: #9aa0a6; font-weight: 600; }
.ew-due-sub { font-size: 11px; color: #9aa0a6; margin-top: 3px; white-space: nowrap; }

.ew-pay { font-size: 13px; line-height: 1.7; max-width: 250px; }
.ew-pay-row { display: flex; justify-content: space-between; gap: 14px; white-space: nowrap; }
.ew-pay-lbl { color: #9aa0a6; }
.ew-pay-amt { font-variant-numeric: tabular-nums; font-weight: 600; }
.ew-pay-row.ew-p-paid .ew-pay-lbl, .ew-pay-row.ew-p-paid .ew-pay-amt { color: #27763a; }
.ew-pay-row.ew-p-owed .ew-pay-amt { color: #b86e00; font-weight: 700; }
.ew-pay-row.ew-rule { border-top: 1px solid #d0d8e0; margin-top: 3px; padding-top: 3px; }

.ew-row-tl td { padding: 0 12px 14px !important; border-bottom: 1px solid #e3e6ea; }
.ew-row-main td { border-bottom: none !important; padding-bottom: 6px !important; }
.ew-row-todo td { border-bottom: none !important; padding: 2px 12px 0 !important; }
.ew-todo { background: #f6f8fa; border-left: 3px solid #199ad0; border-radius: 0;
  padding: 7px 11px; font-size: 15px; color: #1f2d3d; line-height: 1.45;
  font-weight: 500; }
.ew-todo-lbl { font-size: 13px; font-weight: 800; color: #199ad0;
  text-transform: uppercase; letter-spacing: .6px; margin-right: 9px; }
tr.ew-done td { opacity: .55; }
.ew-addr { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ew-total-bar { display: flex; justify-content: flex-end; gap: 24px; font-size: 14px;
  padding: 12px 4px 0; color: #6b7280; }
.ew-total-bar b { color: #b86e00; }

/* Progress timeline (ported from the client status page) */
.ew-tl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 20px; padding-bottom: 2px; }
.ew-tl { display: flex; align-items: flex-start; position: relative; padding-top: 4px; min-width: 640px; }
.ew-tl-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.ew-tl-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #dfe3e7;
  background: #fff; z-index: 1; position: relative; }
.ew-tl-step.done .ew-tl-dot { background: #4a90c4; border-color: #4a90c4; }
.ew-tl-step.active .ew-tl-dot { background: #2c5f8a; border-color: #2c5f8a;
  box-shadow: 0 0 0 5px rgba(44,95,138,.2); width: 18px; height: 18px; }
.ew-tl-step.complete-phase.active .ew-tl-dot { background: #27763a; border-color: #27763a;
  box-shadow: 0 0 0 5px rgba(39,118,58,.2); }
.ew-tl-lbl { font-size: 9px; color: #c2c6cb; margin-top: 7px; text-align: center;
  line-height: 1.2; max-width: 58px; }
.ew-tl-step.done .ew-tl-lbl { color: #8b9197; }
.ew-tl-step.active .ew-tl-lbl { color: #2c5f8a; font-weight: 700; font-size: 10px; }
.ew-tl-step.complete-phase.active .ew-tl-lbl { color: #27763a; }
.ew-tl-conn { position: absolute; top: 6px; left: 50%; width: 100%; height: 3px;
  background: #ebeef1; z-index: 0; }
.ew-tl-step.active .ew-tl-conn { top: 8px; }
.ew-tl-step.done .ew-tl-conn { background: #4a90c4; }
.ew-tl-step:last-child .ew-tl-conn { display: none; }

/* Pay table */
.ew-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #e0e0e0;
  border-radius: 12px; background: #fff; }
table.ew-tbl { width: 100%; border-collapse: collapse; font-size: 14px; background: #fff;
  table-layout: fixed; min-width: 900px; }
.ew-tbl th { background: #f0f4f8; color: #2c5f8a; text-align: left; padding: 11px 12px;
  font-size: 12px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap;
  border-bottom: 2px solid #d0d8e0; }
.ew-tbl td { padding: 11px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
.ew-tbl tr:last-child td { border-bottom: none; }
.ew-num { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
.ew-owed { color: #b86e00; font-weight: 700; }
.ew-paid { color: #27763a; }
.ew-total-row td { background: #f8f9fa; font-weight: 700; border-top: 2px solid #d0d8e0; }
.ew-pay-detail { font-size: 12px; color: #777; }
.ew-tbl .ew-job { font-size: 15px; }
.ew-ftr { text-align: center; font-size: 12px; color: #bbb; margin-top: 28px; }
</style>
</head>
<body>

<!-- ── Site nav (matches plansman.com) ─────────────────── -->
<nav id="pm-nav">
  <div class="pm-container">
    <div id="pm-logo">
      <a href="https://www.plansman.com/"><img src="logo.png" alt="plansman.com"></a>
    </div>
    <ul>
      <li><a href="https://www.plansman.com/">Home</a></li>
      <li><a href="https://www.plansman.com/portfolio.html">Portfolio</a></li>
      <li><a href="https://www.plansman.com/my-project.html">My Project</a></li>
      <li class="pm-active"><a href="./">My Work</a></li>
    </ul>
  </div>
</nav>

<div id="pm-main">
<div class="ew-wrap" style="padding-top: 28px;">
  <p class="ew-sub" id="ew-sub">Sign in to see your projects</p>

  <!-- STEP 1: name -->
  <form class="ew-login" id="ew-name-form">
    <label for="ew-name">Your name</label>
    <input type="text" id="ew-name" placeholder="e.g. Frank" autocomplete="off" autofocus>
    <button type="submit">Continue</button>
  </form>

  <!-- STEP 2: pin -->
  <form class="ew-login" id="ew-pin-form" style="display:none">
    <div class="ew-greet" id="ew-greet"></div>
    <label for="ew-pin">Enter your PIN</label>
    <input type="password" id="ew-pin" inputmode="numeric" autocomplete="off" placeholder="••••">
    <button type="submit" id="ew-pin-btn">View my work</button>
    <div class="ew-err" id="ew-login-err" style="display:none"></div>
    <a class="ew-back" id="ew-back">&larr; Not you? Go back</a>
  </form>

  <!-- RESULTS -->
  <div id="ew-results" style="display:none"></div>

  <div class="ew-ftr">Plansman Inc &bull; Questions? Contact Lance</div>
</div>
</div>

<!-- ── Site footer (matches plansman.com) ──────────────── -->
<footer id="pm-footer">
  <div class="pm-container">
    southern california<span class="pm-dot">.</span><a href="mailto:projects@PLANSMAN.COM">projects@PLANSMAN.COM</a><span class="pm-dot">.</span><a href="tel:9498006106">949.800.6106</a>
  </div>
</footer>

<script>
(function () {
  var SB_URL = "https://kwcoqoizrwqxpfrkwkfv.supabase.co/rest/v1";
  var SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3Y29xb2l6cndxeHBmcmt3a2Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzQxMjAsImV4cCI6MjA5MDE1MDEyMH0.UY0OW4BnbG0SRhxrgDGibqyKHsXrN9j-JJzx2KSMQzk";

  var DISPLAY = ["In Design", "Client Review", "Const. Docs.", "Submitted", "Backcheck",
                 "Resubmitted", "Approved", "Construction", "Revision", "Complete"];
  function phaseToIdx(p) {
    var map = { "In Design": 0, "Client Review": 1, "Const. Docs": 2, "Const. Docs.": 2,
      "Submitted": 3, "Plancheck": 3, "Backcheck": 4, "Resubmitted": 5, "Approved": 6,
      "Construction": 7, "Revision": 8, "Complete": 9 };
    return (p in map) ? map[p] : 0;
  }

  var nameForm = document.getElementById("ew-name-form");
  var pinForm  = document.getElementById("ew-pin-form");
  var results  = document.getElementById("ew-results");
  var sub      = document.getElementById("ew-sub");
  var loginErr = document.getElementById("ew-login-err");
  var pendingName = "";

  nameForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var n = document.getElementById("ew-name").value.trim();
    if (!n) return;
    pendingName = n;
    document.getElementById("ew-greet").textContent = "Hi " + n + " 👋";
    nameForm.style.display = "none";
    pinForm.style.display = "block";
    sub.style.display = "none";
    document.getElementById("ew-pin").focus();
  });

  document.getElementById("ew-back").addEventListener("click", function () {
    pinForm.style.display = "none";
    nameForm.style.display = "block";
    sub.style.display = "";
    loginErr.style.display = "none";
    document.getElementById("ew-pin").value = "";
    document.getElementById("ew-name").focus();
  });

  pinForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var pin = document.getElementById("ew-pin").value.trim();
    if (!pin) return;
    var btn = document.getElementById("ew-pin-btn");
    btn.disabled = true; btn.textContent = "Checking...";
    loginErr.style.display = "none";

    fetch(SB_URL + "/rpc/get_employee_portal", {
      method: "POST",
      headers: { "apikey": SB_ANON, "Authorization": "Bearer " + SB_ANON,
                 "Content-Type": "application/json" },
      body: JSON.stringify({ p_name: pendingName, p_pin: pin })
    })
    .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function (data) {
      btn.disabled = false; btn.textContent = "View my work";
      if (!data || !data.ok) {
        loginErr.textContent = "Name or PIN not recognized. Try again.";
        loginErr.style.display = "block";
        return;
      }
      render(data);
    })
    .catch(function (err) {
      btn.disabled = false; btn.textContent = "View my work";
      loginErr.textContent = "Couldn't connect. Please try again.";
      loginErr.style.display = "block";
      console.error(err);
    });
  });

  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : s); return d.innerHTML; }
  function money(v) { if (v == null || v === "") return ""; var n = Number(v);
    if (isNaN(n)) return esc(v); return "$" + n.toLocaleString("en-US"); }

  function phaseBadge(phase) {
    if (!phase) return '<span class="ew-muted">No phase yet</span>';
    var bc = "#2c5f8a", bg = "#e8f4fd";
    if (phase === "Approved" || phase === "Construction" || phase === "Complete") { bc = "#27763a"; bg = "#e8f8e8"; }
    if (phase === "Client Review" || phase === "Backcheck") { bc = "#b86e00"; bg = "#fff3e0"; }
    return '<span class="ew-badge" style="background:' + bg + ';color:' + bc + '">' + esc(phase) + '</span>';
  }

  function timeline(phase) {
    var idx = phaseToIdx(phase);
    var h = '<div class="ew-tl-wrap"><div class="ew-tl">';
    for (var i = 0; i < DISPLAY.length; i++) {
      var cls = "ew-tl-step";
      if (i < idx) cls += " done";
      if (i === idx) cls += " active";
      if (i === DISPLAY.length - 1) cls += " complete-phase";
      h += '<div class="' + cls + '"><div class="ew-tl-conn"></div>' +
           '<div class="ew-tl-dot"></div><div class="ew-tl-lbl">' + DISPLAY[i] + '</div></div>';
    }
    return h + "</div></div>";
  }

  function myDays(j) {
    // LANE dates only — the project-due fallback is gone (Lance 2026-07-22)
    var n = parseInt(j.my_days, 10);
    return isNaN(n) ? null : n;
  }
  function myDue(j) { return j.my_due_date || ""; }
  function isDone(j) { return (j.phase || "").trim().toLowerCase() === "complete"; }
  function isParked(j) {
    // "Out of their court": their lane date was cleared -> nothing due
    // from them right now. Grey + sink (Lance 2026-07-22). Only when the
    // payload actually carries lane fields (post-ALTER) — otherwise
    // everything would grey out on old data.
    return ("my_due_date" in j) && !j.my_due_date && !j.my_days && !isDone(j);
  }

  function dueCell(j) {
    if (isDone(j)) return '<span class="ew-due ew-due-none">done</span>';
    if (isParked(j)) return '<span class="ew-due ew-due-none">not in your lane</span>';
    var due = myDue(j), d = myDays(j);
    if (!due && d == null) return '<span class="ew-due ew-due-none">no date</span>';
    var cls = "ew-due-none", note = "";
    if (d != null) {
      cls = d <= 0 ? "ew-due-red" : (d <= 4 ? "ew-due-amber" : "ew-due-green");
      note = d < 0 ? (-d) + " days overdue" : d === 0 ? "due today"
           : d === 1 ? "due tomorrow" : d + " days left";
    }
    var h = '<span class="ew-due ' + cls + '">' + esc(due || (d + "d")) + "</span>";
    var sub = note;
    if (j.my_lane) sub = (sub ? sub + " · " : "") + esc(j.my_lane);
    if (sub) h += '<div class="ew-due-sub">' + sub + "</div>";
    return h;
  }

  function payRow(lbl, amt, cls) {
    return '<div class="ew-pay-row' + (cls ? " " + cls : "") + '">' +
           '<span class="ew-pay-lbl">' + lbl + '</span>' +
           '<span class="ew-pay-amt">' + amt + "</span></div>";
  }

  function payCell(j) {
    var hasAny = j.amount != null || j.balance != null || (j.payments && j.payments.length);
    if (!hasAny) return '<span class="ew-muted">—</span>';
    var h = '<div class="ew-pay">';
    if (j.amount != null) h += payRow("Total", money(j.amount), "");
    var pays = (j.payments || []).filter(function (p) { return p.paid; });
    for (var i = 0; i < pays.length; i++) {
      h += payRow("Paid" + (pays[i].date ? " " + esc(pays[i].date) : ""),
                  money(pays[i].paid), "ew-p-paid");
    }
    var bal = Number(j.balance) || 0;
    if (bal > 0) h += payRow("Remaining", money(bal), "ew-p-owed ew-rule");
    else if (j.amount != null) h += payRow("Remaining", "$0 — paid in full", "ew-p-paid ew-rule");
    return h + "</div>";
  }

  function jobRows(j) {
    var done = (isDone(j) || isParked(j)) ? " ew-done" : "";
    var h = '<tr class="ew-row-main' + done + '">' +
      '<td><span class="ew-job">' + esc(j.proj_no) + "</span>" +
      (j.type ? '<div class="ew-type">' + esc(j.type) + "</div>" : "") + "</td>" +
      '<td class="ew-addr">' + esc(j.address || "") + "</td>" +
      "<td>" + phaseBadge(j.phase) + "</td>" +
      "<td>" + dueCell(j) + "</td>" +
      "<td>" + payCell(j) + "</td>" +
    "</tr>";
    // "What to do" strip — fed by my_note when a source is wired up (TBD);
    // until then it renders only when the field has content.
    if (!isDone(j) && !isParked(j) && j.my_note)
      h += '<tr class="ew-row-todo' + done + '"><td colspan="5">' +
           '<div class="ew-todo"><span class="ew-todo-lbl">' +
           esc((j.my_lane || 'To do')) + ':</span>' +
           esc(j.my_note) + "</div></td></tr>";
    h += '<tr class="ew-row-tl' + done + '"><td colspan="5">' + timeline(j.phase) + "</td></tr>";
    return h;
  }

  function render(data) {
    nameForm.style.display = "none";
    pinForm.style.display = "none";
    sub.style.display = "none";
    results.style.display = "block";

    var jobs = data.jobs || [];
    var h = '<div class="ew-hdr"><h2>' + esc(data.employee || "My") + "&rsquo;s Projects</h2>" +
            '<span class="ew-logout" id="ew-logout">Sign out</span></div>';

    if (!jobs.length) {
      h += '<p class="ew-muted" style="padding:20px 4px">No projects are assigned to you right now.</p>';
      results.innerHTML = h;
      wireLogout();
      return;
    }

    // ── Sort: most urgent first (their lane days, else phase days),
    //    dateless after dated, Complete at the bottom ──
    jobs.sort(function (a, b) {
      var ra = isDone(a) ? 2 : (isParked(a) ? 1 : 0);
      var rb = isDone(b) ? 2 : (isParked(b) ? 1 : 0);
      if (ra !== rb) return ra - rb;
      var na = myDays(a), nb = myDays(b);
      if (na == null && nb == null) return String(a.proj_no).localeCompare(String(b.proj_no));
      if (na == null) return 1;
      if (nb == null) return -1;
      return na - nb;
    });

    // ── WORKFLOW-style table: data row + labeled progress row per project ──
    h += '<div class="ew-scroll"><table class="ew-tbl"><thead><tr>' +
         '<th style="width:7%">Job</th><th>Address</th>' +
         '<th style="width:14%">Phase</th><th style="width:16%">Your due</th>' +
         '<th style="width:22%">Pay</th>' +
         "</tr></thead><tbody>";
    for (var i = 0; i < jobs.length; i++) h += jobRows(jobs[i]);
    h += "</tbody></table></div>";

    var totalBal = 0;
    for (var k = 0; k < jobs.length; k++) totalBal += Number(jobs[k].balance) || 0;
    if (totalBal > 0)
      h += '<div class="ew-total-bar"><span>Total owed to you: <b>' +
           money(totalBal) + "</b></span></div>";

    results.innerHTML = h;
    wireLogout();
  }

  function wireLogout() {
    var lo = document.getElementById("ew-logout");
    if (lo) lo.addEventListener("click", function () {
      results.style.display = "none";
      results.innerHTML = "";
      document.getElementById("ew-pin").value = "";
      pinForm.style.display = "none";
      nameForm.style.display = "block";
      sub.style.display = "";
      document.getElementById("ew-name").focus();
    });
  }
})();
</script>
</body>
</html>
